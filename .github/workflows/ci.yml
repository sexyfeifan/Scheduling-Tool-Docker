name: CI

on:
  push:
    branches: [main, v2.60-dev]
  pull_request:
    branches: [main, v2.60-dev]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      
      - name: Install dependencies
        working-directory: server
        run: npm ci
      
      - name: Run ESLint
        run: npx eslint server/ client/js/ --max-warnings=50 || true
      
      - name: Run tests
        working-directory: server
        run: npm test
