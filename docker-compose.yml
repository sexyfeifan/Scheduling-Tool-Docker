services:
  scheduling-tool:
    image: sexyfeifan/scheduling-tool:2.17
    container_name: scheduling-tool
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - BACKUP_DIR=/app/backups
      - BACKUP_PASSWORD=${BACKUP_PASSWORD:-change-me}
    restart: unless-stopped
