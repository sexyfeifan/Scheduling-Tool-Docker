services:
  scheduling-tool:
    image: sexyfeifan/scheduling-tool:3.30
    container_name: scheduling-tool
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
    environment:
      - DATA_DIR=/app/data
      - BACKUP_DIR=/app/backups
      - BACKUP_PASSWORD=${BACKUP_PASSWORD:-sexyfeifan}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
